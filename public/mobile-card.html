<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>모바일 명함 - 김용준 이사</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body {
        font-family: "Pretendard", sans-serif;
      }

      .card-wrapper {
        width: 1080px;
        height: 1920px;
        transform-origin: center center;
        flex-shrink: 0;
      }

      .card {
        width: 1080px;
        height: 1920px;
        background: linear-gradient(
          180deg,
          #0f1a2e 0%,
          #0a1220 50%,
          #0f1a2e 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 275px 80px 80px;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(201, 168, 76, 0.08) 0%,
          transparent 70%
        );
        border-radius: 50%;
      }

      .card::after {
        content: "";
        position: absolute;
        bottom: -150px;
        left: -150px;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(201, 168, 76, 0.05) 0%,
          transparent 70%
        );
        border-radius: 50%;
      }

      .top-accent {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      }

      .logo-section {
        text-align: center;
        margin-bottom: 60px;
        position: relative;
        z-index: 1;
      }

      .logo-img {
        height: 160px;
        width: auto;
      }

      .name-section {
        text-align: center;
        margin-bottom: 50px;
        position: relative;
        z-index: 1;
      }

      .name {
        font-size: 72px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 20px;
        margin-bottom: 25px;
      }

      .position {
        font-size: 32px;
        color: #c9a84c;
        font-weight: 600;
        letter-spacing: 10px;
        padding: 14px 40px;
        border: 1px solid rgba(201, 168, 76, 0.4);
        border-radius: 35px;
        display: inline-block;
      }

      .divider {
        width: 200px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #c9a84c, transparent);
        margin: 40px 0;
      }

      .slogan-section {
        text-align: center;
        margin-bottom: 50px;
        position: relative;
        z-index: 1;
      }

      .slogan {
        font-size: 36px;
        color: #ffffff;
        font-weight: 600;
        letter-spacing: 2px;
        margin-bottom: 20px;
        line-height: 1.4;
      }

      .service-tags {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .service-tag {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.7);
        padding: 10px 24px;
        background: rgba(201, 168, 76, 0.1);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 25px;
        letter-spacing: 1px;
      }

      .contact-section {
        width: 100%;
        max-width: 900px;
        position: relative;
        z-index: 1;
        margin: 0 auto;
      }

      .contact-item {
        display: flex;
        align-items: center;
        padding: 26px 40px 26px 230px;
      }

      .contact-icon {
        width: 56px;
        height: 56px;
        background: rgba(201, 168, 76, 0.1);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 24px;
        flex-shrink: 0;
      }

      .contact-icon svg {
        width: 26px;
        height: 26px;
        fill: #c9a84c;
      }

      .contact-text {
        flex: 1;
      }

      .contact-label {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .contact-value {
        font-size: 32px;
        color: #ffffff;
        font-weight: 600;
        letter-spacing: 2px;
      }

      .contact-value.small {
        font-size: 26px;
      }

      .contact-value.address {
        font-size: 22px;
      }

      .partnership {
        margin-top: auto;
        padding-top: 40px;
        padding-bottom: 60px;
        text-align: center;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
      }

      .jjk-banner {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        background: rgba(201, 168, 76, 0.08);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 12px;
        padding: 14px 28px;
      }

      .jjk-banner img {
        height: 24px;
        width: auto;
        filter: brightness(0) invert(1);
      }

      .jjk-banner span {
        font-size: 18px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.6);
        white-space: nowrap;
      }

      .website {
        font-size: 28px;
        color: #c9a84c;
        letter-spacing: 3px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card-wrapper" id="cardWrapper">
      <div class="card">
        <div class="top-accent"></div>

        <div class="logo-section">
          <img
            src="images/jni-logo-symbol.png"
            alt="제이앤아이 파트너스"
            class="logo-img"
          />
        </div>

        <div class="name-section">
          <h1 class="name">김 용 준</h1>
          <span class="position">이사</span>
        </div>

        <div class="divider"></div>

        <div class="slogan-section">
          <p class="slogan">
            자금 문제 해결의 맞춤 파트너<br />기업의 신뢰를 만듭니다
          </p>
          <div class="service-tags">
            <span class="service-tag">정책자금 컨설팅</span>
            <span class="service-tag">경영컨설팅</span>
            <span class="service-tag">기업인증</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="contact-section">
          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24">
                <path
                  d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"
                />
              </svg>
            </div>
            <div class="contact-text">
              <p class="contact-label">대표전화</p>
              <p class="contact-value">1533-9018</p>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24">
                <path
                  d="M15.5 1h-8C6.12 1 5 2.12 5 3.5v17C5 21.88 6.12 23 7.5 23h8c1.38 0 2.5-1.12 2.5-2.5v-17C18 2.12 16.88 1 15.5 1zm-4 21c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4.5-4H7V4h9v14z"
                />
              </svg>
            </div>
            <div class="contact-text">
              <p class="contact-label">휴대전화</p>
              <p class="contact-value">010-8877-9851</p>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24">
                <path
                  d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
                />
              </svg>
            </div>
            <div class="contact-text">
              <p class="contact-label">이메일</p>
              <p class="contact-value small">yongjoon@jeinico26.com</p>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
                />
              </svg>
            </div>
            <div class="contact-text">
              <p class="contact-label">주소</p>
              <p class="contact-value address">
                서울특별시 구로구 고척로19길 69-3, 303호
              </p>
            </div>
          </div>
        </div>

        <div class="partnership">
          <div class="jjk-banner">
            <img src="images/jjk-logo.png" alt="JJK 정책자금지원센터" />
            <span>정책자금지원센터 | 업무협약 제이앤아이 파트너스</span>
          </div>
          <p class="website">jnipartners.co.kr</p>
        </div>
      </div>
    </div>
    <script>
      function fitCard() {
        var w = document.getElementById("cardWrapper");
        var sx = window.innerWidth / 1080;
        var sy = window.innerHeight / 1920;
        var s = Math.min(sx, sy, 1);
        w.style.transform = "scale(" + s + ")";
      }
      fitCard();
      window.addEventListener("resize", fitCard);
    </script>
  </body>
</html>
